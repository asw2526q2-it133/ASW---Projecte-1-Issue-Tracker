openapi: 3.0.0
info:
  title: Taiga API (ASW Project)
  description: API REST per al gestor d'incidències.
  version: 1.0.0

servers:
  - url: http://localhost:10000/api
    description: Servidor Local
  # Afegeix aquí el de Render quan el tinguis, ex: url: https://la-teva-app.onrender.com/api

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key

  schemas:
    # --- NOU: Esquemes per a Comentaris i Activitats (US90) ---
    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        body:
          type: string
          example: "He revisat això i segueix fallant."
        user_id:
          type: integer
          example: 2
        created_at:
          type: string
          format: date-time
          
    Activity:
      type: object
      properties:
        id:
          type: integer
          example: 10
        description:
          type: string
          example: "L'usuari ha canviat l'estat a In Progress"
        created_at:
          type: string
          format: date-time
    # ---------------------------------------------------------

    Issue:
      type: object
      properties:
        id:
          type: integer
          example: 1
        subject:
          type: string
          example: "Afegir botó de login"
        description:
          type: string
          example: "Cal afegir un botó al menú principal..."
        status_id:
          type: integer
          example: 2
        user_id:
          type: integer
          example: 5
        created_at:
          type: string
          format: date-time
        # --- NOU: Afegim les llistes a la Issue (US90) ---
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
        # -------------------------------------------------

security:
  - ApiKeyAuth: []

paths:
  /issues:
    get:
      summary: Llista totes les issues
      description: Retorna un array amb totes les issues del sistema en format JSON.
      tags:
        - Issues
      responses:
        '200':
          description: Operació exitosa.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat. Cal una API Key.
          
    post:
      summary: Crea una nova issue
      description: Afegeix una nova incidència al sistema. Fa servir multipart/form-data per permetre pujar fitxers des de l'editor.
      tags:
        - Issues
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                'issue[subject]':
                  type: string
                  description: Títol de la issue (Obligatori)
                  example: "S'ha trencat el botó de login"
                'issue[description]':
                  type: string
                  description: Descripció detallada
                  example: "Quan intento fer login, la pàgina dóna error 500."
                'issue[issue_type_id]':
                  type: integer
                  example: 1
                'issue[severity_id]':
                  type: integer
                  example: 1
                'issue[priority_id]':
                  type: integer
                  example: 1
                'issue[status_id]':
                  type: integer
                  example: 1
                'issue[attachments][]':
                  type: array
                  items:
                    type: string
                    format: binary
                  description: "Pots seleccionar i pujar diversos fitxers aquí"
      responses:
        '201':
          description: Issue creada correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat. Api-Key invàlida o absent.
        '422':
          description: Error de validació (ex. falta el subject).

  /issues/{id}:
    get:
      summary: Obté una issue concreta
      description: Retorna les dades d'una incidència concreta incloent els seus comentaris i activitats (Tasques de la US90).
      tags:
        - Issues
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID de la incidència que volem consultar.
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Operació exitosa. Retorna la informació de la issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat. Api-Key invàlida o absent.
        '404':
          description: Error. La issue sol·licitada no existeix.