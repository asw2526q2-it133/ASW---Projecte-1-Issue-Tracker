openapi: 3.0.0
info:
  title: Taiga API (ASW Project)
  description: API REST per al gestor d'incidències.
  version: 1.0.0

servers:
  - url: http://localhost:10000/api
    description: Servidor Local
  # Afegeix aquí el de Render quan el tinguis, ex: url: https://la-teva-app.onrender.com/api

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key

  schemas:
    # --- NOU: Esquemes per a Comentaris i Activitats (US90) ---
    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        body:
          type: string
          example: "He revisat això i segueix fallant."
        user_id:
          type: integer
          example: 2
        created_at:
          type: string
          format: date-time
          
    Activity:
      type: object
      properties:
        id:
          type: integer
          example: 10
        description:
          type: string
          example: "L'usuari ha canviat l'estat a In Progress"
        created_at:
          type: string
          format: date-time
    # ---------------------------------------------------------

    Issue:
      type: object
      properties:
        id:
          type: integer
          example: 1
        subject:
          type: string
          example: "Afegir botó de login"
        description:
          type: string
          example: "Cal afegir un botó al menú principal..."
        status_id:
          type: integer
          example: 2
        user_id:
          type: integer
          example: 5
        created_at:
          type: string
          format: date-time
        # --- NOU: Afegim les llistes a la Issue (US90) ---
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
    # -------------------------------------------------
    IssueType:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Bug"
        color:
          type: string
          example: "#ff0000"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    #----------------------------------------------------------
    Severity:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Important"
        color:
          type: string
          example: "#ff9900"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
security:
  - ApiKeyAuth: []

paths:
  /issues:
    get:
      summary: Llista totes les issues
      description: Retorna un array amb totes les issues del sistema en format JSON.
      tags:
        - Issues
      responses:
        '200':
          description: Operació exitosa.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat. Cal una API Key.
          
    post:
      summary: Crea una nova issue
      description: Afegeix una nova incidència al sistema. Fa servir multipart/form-data per permetre pujar fitxers al crear.
      tags:
        - Issues
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                'issue[subject]':
                  type: string
                  description: Títol de la issue (Obligatori)
                  example: "S'ha trencat el botó de login"
                'issue[description]':
                  type: string
                  description: Descripció detallada
                  example: "Quan intento fer login, la pàgina dóna error 500."
                'issue[issue_type_id]':
                  type: integer
                  example: 1
                'issue[severity_id]':
                  type: integer
                  example: 1
                'issue[priority_id]':
                  type: integer
                  example: 1
                'issue[status_id]':
                  type: integer
                  example: 1
                'issue[attachments][]':
                  type: array
                  items:
                    type: string
                    format: binary
                  description: "Pots seleccionar i pujar diversos fitxers aquí"
      responses:
        '201':
          description: Issue creada correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat. Api-Key invàlida o absent.
        '422':
          description: Error de validació (ex. falta el subject).

  /issues/{id}:
    get:
      summary: Obté una issue concreta
      description: Retorna les dades d'una incidència concreta incloent els seus comentaris i activitats.
      tags:
        - Issues
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID de la incidència que volem consultar.
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Operació exitosa. Retorna la informació de la issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat. Api-Key invàlida o absent.
        '404':
          description: Error. La issue sol·licitada no existeix.

    patch:
      summary: Actualitza dades i comentaris
      description: Actualitza els camps generals, la data límit (due_date) i els comentaris.
      tags:
        - Issues
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issue:
                  type: object
                  properties:
                    subject:
                      type: string
                      example: "Nou títol corregit"
                    description:
                      type: string
                    due_date:
                      type: string
                      format: date
                      example: "2024-12-31"
                    status_id:
                      type: integer
                    comments_attributes:
                      type: array
                      items:
                        type: object
                        properties:
                          body:
                            type: string
                            example: "Afegint un comentari des de l'API"
      responses:
        '200':
          description: Issue actualitzada.
        '403':
          description: No tens permís per modificar-la.
        '422':
          description: Error de validació.

    delete:
      summary: Elimina una issue
      description: Esborra una incidència sencera del sistema.
      tags:
        - Issues
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Issue eliminada correctament.
        '403':
          description: No tens permís.
        '404':
          description: La issue no existeix.

  /issues/{id}/watchers:
    post:
      summary: Afegeix un watcher
      description: Afegeix un usuari com a observador de la issue. Genera activitat automàtica.
      tags:
        - Watchers & Attachments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                watcher_id:
                  type: integer
                  example: 2
      responses:
        '200':
          description: Watcher afegit correctament.
        '404':
          description: Usuari no trobat.

  /issues/{id}/watchers/{watcher_id}:
    delete:
      summary: Elimina un watcher
      description: Treu un usuari de la llista d'observadors. Genera activitat automàtica.
      tags:
        - Watchers & Attachments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: watcher_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Watcher eliminat.
        '404':
          description: Usuari no trobat.

  /issues/{id}/attachments:
    post:
      summary: Afegeix un fitxer adjunt
      description: Puja un fitxer nou a la issue. Genera activitat automàtica.
      tags:
        - Watchers & Attachments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                attachment:
                  type: string
                  format: binary
      responses:
        '200':
          description: Fitxer adjuntat.
        '422':
          description: Cap fitxer proporcionat.

  /issues/{id}/attachments/{attachment_id}:
    delete:
      summary: Elimina un fitxer adjunt
      description: Esborra un fitxer concret usant el seu ID. Genera activitat automàtica.
      tags:
        - Watchers & Attachments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: attachment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Fitxer eliminat correctament.
        '404':
          description: Fitxer no trobat.
  #----------------------------------------------------------
  /issue_types:
    get:
      summary: Llista tots els tipus d'incidència
      description: Retorna un array amb tots els tipus d'incidència disponibles al sistema.
      tags:
        - Issue Types
      responses:
        '200':
          description: Operació exitosa.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IssueType'
        '401':
          description: No autoritzat. Cal una API Key.
    post:
      summary: Crea un nou tipus d'incidència
      description: Afegeix un nou tipus (ex. Bug, Question) al sistema.
      tags:
        - Issue Types
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issue_type:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Nom del tipus (Obligatori i únic)
                      example: "Enhancement"
                    color:
                      type: string
                      description: Color en format HEX
                      example: "#3498db"
      responses:
        '201':
          description: Tipus creat correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueType'
        '401':
          description: No autoritzat. Api-Key invàlida o absent.
        '422':
          description: Error de validació (ex. nom duplicat o buit).

  /issue_types/{id}:
    get:
      summary: Obté un tipus concret
      description: Retorna les dades d'un tipus d'incidència segons el seu ID.
      tags:
        - Issue Types
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID numèric del tipus.
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Operació exitosa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueType'
        '401':
          description: No autoritzat. Api-Key invàlida o absent.
        '404':
          description: Tipus no trobat.

    patch:
      summary: Actualitza un tipus
      description: Modifica el nom o el color d'un tipus existent usant el seu ID numèric.
      tags:
        - Issue Types
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID numèric del tipus que vols modificar.
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issue_type:
                  type: object
                  properties:
                    name:
                      type: string
                      example: "Bug Crític"
                    color:
                      type: string
                      example: "#ff0000"
      responses:
        '200':
          description: Tipus actualitzat correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueType'
        '401':
          description: No autoritzat. Api-Key invàlida o absent.
        '404':
          description: Tipus no trobat.
        '422':
          description: Error de validació.

    delete:
      summary: Esborra un tipus
      description: Elimina un tipus del sistema. Si està en ús, cal enviar el paràmetre `replacement_id` per reassignar les issues. No es pot esborrar si només en queda un.
      tags:
        - Issue Types
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID numèric del tipus que vols esborrar.
          schema:
            type: integer
            example: 1
        - name: replacement_id
          in: query
          required: false
          description: L'ID del tipus que heretarà les issues (Obligatori si el tipus que s'esborra està en ús).
          schema:
            type: integer
            example: 2
      responses:
        '204':
          description: Tipus eliminat correctament (Sense contingut).
        '401':
          description: No autoritzat. Api-Key invàlida o absent.
        '404':
          description: Tipus o replacement_id no trobat.
        '422':
          description: Error. Falta el replacement_id, s'està intentant esborrar l'últim registre, etc.
  /severities:
    get:
      summary: Llista totes les severitats
      description: Retorna un array amb totes les severitats disponibles al sistema.
      tags:
        - Severities
      responses:
        '200':
          description: Operació exitosa.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Severity'
        '401':
          description: No autoritzat. Cal una API Key.
    post:
      summary: Crea una nova severitat
      description: Afegeix una nova severitat al sistema.
      tags:
        - Severities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                severity:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Nom de la severitat (Obligatori i únic)
                      example: "Crítica"
                    color:
                      type: string
                      description: Color en format HEX
                      example: "#ff0000"
      responses:
        '201':
          description: Severitat creada correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Severity'
        '401':
          description: No autoritzat. Api-Key invàlida o absent.
        '422':
          description: Error de validació.

  /severities/{id}:
    get:
      summary: Obté una severitat concreta
      description: Retorna les dades d'una severitat segons el seu ID.
      tags:
        - Severities
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID numèric de la severitat.
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Operació exitosa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Severity'
        '401':
          description: No autoritzat. Api-Key invàlida o absent.
        '404':
          description: Severitat no trobada.

    patch:
      summary: Actualitza una severitat
      description: Modifica el nom o el color d'una severitat.
      tags:
        - Severities
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID numèric de la severitat.
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                severity:
                  type: object
                  properties:
                    name:
                      type: string
                      example: "Molt Crítica"
                    color:
                      type: string
                      example: "#8b0000"
      responses:
        '200':
          description: Severitat actualitzada correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Severity'
        '401':
          description: No autoritzat.
        '404':
          description: Severitat no trobada.
        '422':
          description: Error de validació.

    delete:
      summary: Esborra una severitat
      description: Elimina una severitat del sistema. Si està en ús, cal enviar el paràmetre `replacement_id`.
      tags:
        - Severities
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID numèric de la severitat que vols esborrar.
          schema:
            type: integer
            example: 1
        - name: replacement_id
          in: query
          required: false
          description: L'ID de la severitat que heretarà les issues.
          schema:
            type: integer
            example: 2
      responses:
        '204':
          description: Severitat eliminada correctament.
        '401':
          description: No autoritzat.
        '404':
          description: Severitat o replacement_id no trobat.
        '422':
          description: Error. Falta el replacement_id o s'està intentant esborrar l'últim registre.


  /users/{id}:
      get:
        summary: Obté el perfil d'un usuari
        description: Retorna les dades públiques d'un usuari, incloent-hi la URL del seu avatar si en té.
        tags:
          - Users
        parameters:
          - name: id
            in: path
            required: true
            description: ID de l'usuari
            schema:
              type: integer
        responses:
          '200':
            description: Operació exitosa.
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    name:
                      type: string
                      example: "roger"
                    full_name:
                      type: string
                      example: "Roger Guinovart"
                    email:
                      type: string
                      example: "roger@example.com"
                    bio:
                      type: string
                      example: "Desenvolupador Full-Stack"
                    avatar_url:
                      type: string
                      nullable: true
                      example: "http://localhost:10000/rails/active_storage/blobs/redirect/..."
          '400':
            description: Paràmetre invàlid. L'ID ha de ser un enter positiu.
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    error:
                      type: string
                      example: "L'ID proporcionat no és vàlid."
          '404':
            description: Usuari no trobat.

      patch:
        summary: Actualitza el perfil de l'usuari
        description: Permet modificar la biografia i la foto de perfil. Requereix API Key i només el propi usuari pot editar el seu perfil.
        tags:
          - Users
        parameters:
          - name: id
            in: path
            required: true
            description: ID de l'usuari a editar
            schema:
              type: integer
        requestBody:
          required: true
          content:
            multipart/form-data:
              schema:
                type: object
                properties:
                  'user[bio]':
                    type: string
                    description: Nova biografia de l'usuari
                  'user[avatar]':
                    type: string
                    format: binary
                    description: Nova foto de perfil (JPG, PNG, WEBP)
        responses:
          '200':
            description: Perfil actualitzat correctament.
          '401':
            description: No autoritzat (Falta API Key o és invàlida).
          '403':
            description: Prohibit (Estàs intentant editar el perfil d'un altre usuari).
          '404':
            description: Usuari no trobat.
          '422':
            description: Error de validació (ex. imatge massa gran o format incorrecte).


  /users/{id}/assigned_issues:
      get:
        summary: Llista les issues assignades obertes
        tags: [Users]
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: integer
        responses:
          '200':
            description: Llista d'issues assignades
          '404':
            description: Usuari no trobat

  /users/{id}/watched_issues:
    get:
      summary: Llista les issues observades
      description: Requereix API Key. Només el propi usuari pot veure aquesta llista.
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Llista d'issues observades
        '401':
          description: No autoritzat (Falta API Key)
        '403':
          description: Prohibit (No ets el propietari del perfil)
        '404':
          description: Usuari no trobat

  /users/{id}/comments:
    get:
      summary: Llista els comentaris de l'usuari
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Llista de comentaris
        '404':
          description: Usuari no trobat