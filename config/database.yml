default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: root
  password: "password"
  host: localhost

development:
  <<: *default
  database: taiga_development

test:
  <<: *default
  database: taiga_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV['DATABASE_URL'] %>
  queue:
    <<: *primary_production
  cache:
    <<: *primary_production
  cable:
    <<: *primary_production